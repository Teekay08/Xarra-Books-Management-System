services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: xarra-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_URL=postgres://xarra:xarra@postgres:5432/xarra
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=http://localhost
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@xarrabooks.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: xarra-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: xarra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xarra
      POSTGRES_PASSWORD: xarra
      POSTGRES_DB: xarra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xarra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xarra-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
