name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  API_IMAGE: xarra-api
  WEB_IMAGE: xarra-web
  ECS_CLUSTER: xarra-production
  API_SERVICE: xarra-api
  WEB_SERVICE: xarra-web

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xarra
          POSTGRES_PASSWORD: xarra
          POSTGRES_DB: xarra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://xarra:xarra@localhost:5432/xarra
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          NODE_ENV: test

  deploy:
    name: Deploy to AWS
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/$API_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$API_IMAGE:latest .
          docker push $ECR_REGISTRY/$API_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$API_IMAGE:latest

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$WEB_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$WEB_IMAGE:latest .
          docker push $ECR_REGISTRY/$WEB_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$WEB_IMAGE:latest

      - name: Run database migrations
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            $ECR_REGISTRY/$API_IMAGE:${{ github.sha }} \
            node -e "import('@xarra/db').then(m => m.migrate())"

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: infra/ecs/api-task-def.json
          service: ${{ env.API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy Web to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: infra/ecs/web-task-def.json
          service: ${{ env.WEB_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
